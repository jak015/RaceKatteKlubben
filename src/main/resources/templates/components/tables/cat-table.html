<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="catTable(cats, memberId)" class="cat">
    <table border="1" id="cat-table">
        <thead>
        <tr>
            <th>#</th>
            <th>Billede</th>
            <th>Navn</th>
            <th>Alder</th>
            <th>År/Måned</th>
            <th>Race</th>
            <th>Køn</th>
            <th>Handlinger</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${cats}">
            <td th:text="${cat.id}"></td>
            <td><img th:src="@{'/images/' + ${cat.images}}" alt="cat Image" width="100"></td>
            <td th:text="${cat.catName}"></td>
            <td th:text="${cat.age}"></td>
            <td th:text="${cat.yearOrMonth}"></td>
            <td th:text="${cat.race}"></td>
            <td th:text="${cat.gender}"></td>
            <td class="cat-actions" th:insert="~{components/tables/cat-actions :: catActions(${cat})}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(cats)}">
            <td colspan="8">Du har ingen oprettede katte</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
